services:
    frontend:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
                NEXT_PUBLIC_ANALYSIS_WS_URL: ${NEXT_PUBLIC_ANALYSIS_WS_URL}
                NEXT_PUBLIC_COOKIE_DOMAIN: ${NEXT_PUBLIC_COOKIE_DOMAIN}
        ports:
            - '3000:3000'
        environment:
            NODE_ENV: production
        restart: unless-stopped
